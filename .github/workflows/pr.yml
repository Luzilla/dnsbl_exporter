name: pr

on:
  pull_request:

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    permissions:
      security-events: write
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2

  build_unbound:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
    - id: image
      run: |
        IMAGE_NAME=$(uuidgen)
        echo "name=ttl.sh/${IMAGE_NAME}:1h" >> $GITHUB_OUTPUT
    - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
      with:
        context: .docker/unbound/rootfs
        push: true
        tags: ${{ steps.image.outputs.name }}
    - if: github.event.pull_request.head.repo.full_name == github.repository
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - if: github.event.pull_request.head.repo.full_name == github.repository
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
      with:
        context: .docker/unbound/rootfs
        push: true
        tags: ghcr.io/luzilla/unbound:dev

  test:
    strategy:
      matrix:
        go-version: [1.25.x]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: false
    - run: go test ./...

  release_test:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: go.mod
        cache: false
    - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
    - run: docker buildx ls
    - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
      with:
        version: '~> v2'
        args: release --snapshot --clean

  freebsd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - "15.0"
          - "14.3"
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - id: test
      uses: vmactions/freebsd-vm@4807432c7cab1c3f97688665332c0b932062d31f # v1.4.3
      with:
        release: ${{ matrix.version }}
        copyback: false
        sync: no
        run: uname -a
    - name: install build dependencies
      shell: freebsd {0}
      run: pkg install -y lang/go git-lite devel/goreleaser sysutils/helm
    - name: download source
      shell: freebsd {0}
      run: git clone https://github.com/${{ github.repository }}
    - name: build
      shell: freebsd {0}
      run: cd dnsbl_exporter && goreleaser build --single-target --snapshot --clean
    - shell: freebsd {0}
      run: cd dnsbl_exporter && ./dist/dnsbl_exporter_freebsd_amd64_v1/dnsbl-exporter -h

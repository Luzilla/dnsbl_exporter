name: pr

on:
  pull_request:

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    permissions:
      security-events: write
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7

  build_unbound:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
    - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
    - id: image
      run: |
        IMAGE_NAME=$(uuidgen)
        echo "name=ttl.sh/${IMAGE_NAME}:1h" >> $GITHUB_OUTPUT
    - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .docker/unbound/rootfs
        push: true
        tags: ${{ steps.image.outputs.name }}
      env:
        DOCKER_BUILD_SUMMARY: false
        DOCKER_BUILD_RECORD_UPLOAD: false
    - if: github.event.pull_request.head.repo.full_name == github.repository
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - if: github.event.pull_request.head.repo.full_name == github.repository
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .docker/unbound/rootfs
        push: true
        tags: ghcr.io/luzilla/unbound:dev
      env:
        DOCKER_BUILD_SUMMARY: false
        DOCKER_BUILD_RECORD_UPLOAD: false

  test:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        go-version:
          - 1.25.x
          - 1.26.x
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: false
    - run: go test -v --race ./...

  release_test:
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
        fetch-depth: 0
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: go.mod
        cache: false
    - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
    - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
    - run: docker buildx ls
    - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
      with:
        version: '~> v2'
        args: release --snapshot --clean
    - id: version
      run: |
        version=$(jq -r '.tag | ltrimstr("v")' dist/metadata.json)
        echo "version=${version}" >> $GITHUB_OUTPUT
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dist
        path: dist/
        retention-days: 1
        if-no-files-found: error

  package_test:
    needs: release_test
    name: package-${{ matrix.target }}-${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        target:
          - mariner2/rpm
          - bookworm/deb
          - azlinux3/testing/sysext
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - id: dalec
        uses: ./.github/actions/run-dalec
        with:
          target: ${{ matrix.target }}
          version: ${{ needs.release_test.outputs.version }}
          build-directory: ./dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.dalec.outputs.artifact }}
          path: ${{ steps.dalec.outputs.output-path }}
          retention-days: 2
          if-no-files-found: error

  smoke_test_ubuntu:
    needs: package_test
    runs-on: ${{ matrix.runner }}
    permissions: {}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "dnsbl-exporter_*${{ matrix.arch }}.deb"
          merge-multiple: true
      - env:
          ARCH: ${{ matrix.arch }}
        run: |
          sudo apt update -y
          sudo apt install -y ./dnsbl-exporter_*${ARCH}.deb
      - name: test install
        run: |
          command -v dnsbl-exporter
          dnsbl-exporter -h
      - name: test user/group
        run: |
          getent passwd dnsbl-exporter
          getent group  dnsbl-exporter
      - name: test service
        run: |
          systemctl cat dnsbl-exporter.service
      - name: test config files
        run: |
          test -f /etc/dnsbl-exporter/rbls.ini
          test -f /etc/dnsbl-exporter/rbls-domain.ini
          test -f /etc/dnsbl-exporter/targets.ini

  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - release_test
    services:
      unbound:
        image: ghcr.io/luzilla/unbound:v0.10.0
        ports:
        - 5053:5053/tcp
        - 5053:5053/udp
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: dist
        path: ./dist/
    - run: ls -R ./dist
    - env:
        BINARY: ./dist/dnsbl_exporter_linux_amd64_v1/dnsbl-exporter
      run: |
        chmod +x ${BINARY}
        ${BINARY} \
          --log.debug \
          --config.dns-resolver=localhost:5053 > dnsbl.log 2>&1 &
        echo $! > dnsbl_exporter.pid

        pid=`cat dnsbl_exporter.pid`
        echo "✅ started dnsbl-exporter: ${pid}" >> $GITHUB_STEP_SUMMARY
    - run: |
        timeout 60 bash -c 'until curl -f http://localhost:9211/; do sleep 1; done'
        echo "✅ dnsbl-exporter has started" >> $GITHUB_STEP_SUMMARY
    - name: test metrics
      run: |
        timeout 10 curl -f http://localhost:9211/metrics
    - name: test prober
      run: |
        timeout 10 curl -f http://localhost:9211/prober?target=github.com
    - name: Show logs if failed
      if: failure()
      run: |
        echo "=== dnsbl-exporter logs ==="
        cat dnsbl.log || echo "No log file found"
    - if: always()
      run: |
        if [ -f dnsbl_exporter.pid ]; then
          kill $(cat dnsbl_exporter.pid) || true
        fi

  freebsd:
    needs:
      - check
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        version:
          - "15.0"
          - "14.3"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - id: test
      uses: vmactions/freebsd-vm@5a72679103d223925653750faa878a143340fbd0 # v1.5.0
      with:
        release: ${{ matrix.version }}
        copyback: false
        sync: no
        run: uname -a
    - name: install build dependencies
      shell: freebsd {0}
      run: |
        pkg install -y \
          lang/go \
          git-lite \
          devel/goreleaser \
          sysutils/helm
    - name: download source
      shell: freebsd {0}
      run: git clone https://github.com/${{ github.repository }}
    - name: build
      shell: freebsd {0}
      run: |
        cd dnsbl_exporter && \
        goreleaser build \
          --single-target \
          --snapshot \
          --clean
    - shell: freebsd {0}
      run: |
        cd dnsbl_exporter && \
        ./dist/dnsbl_exporter_freebsd_amd64_v1/dnsbl-exporter -h
